<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./CSS/index.css">
  <title>TodoList</title>
</head>

<body>
  <header id="main-header">
    <h1 id="title">Title</h1>
    <a id="signin">SIGN IN</a>
  </header>
  <div class="content">
    <section id="main-section">
      <!-- 회원가입 -->
      <form id="signin-form" class="hidden">
        <h3>Sign In</h3>
        <div>
          <label for="userID">ID</label>
          <input id="userID" type="text" placeholder="ID" required />
        </div>
        <div>
          <label for="userPW">PW</label>
          <input id="userPW" type="password" placeholder="PW" required />
        </div>
        <button>Sign In</button><h6 id="message"></h6>
      </form>
      <!-- 로그인 -->
      <form id="login-form">
        <h3>Log In</h3>
        <div>
          <label for="userID">ID</label>
          <input id="userID" type="text" placeholder="ID" required />
        </div>
        <div>
          <label for="userPW">PW</label>
          <input id="userPW" type="password" placeholder="PW" required />
        </div>
        <!-- <input id="login_btn" type="submit" value="Log In"> -->
        <button>Log In</button>
      </form>
    </section>
  </div>
  <!-- 스크립트 -->
  <script src="JavaScript/logIn.js"></script>
  <script src="JavaScript/signIn.js"></script>
</body>

</html>
