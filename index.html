<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./CSS/index.css">
  <link rel="stylesheet" href="./CSS/login.css">
  <link rel="stylesheet" href="./CSS/signup.css">
  <link rel="stylesheet" href="./CSS/todolist.css">
  <title>TodoList</title>
</head>

<body>
  <!-- <img src="../image/forest_with_girl.jpg"/> -->
  <header id="main-header">
    <h1 id="title"><a>TodoList</a></h1>
  </header>
  <div class="content">
    <section id="main-section">
    <!-- <section id="main-section" style:="display:none"> -->
      <!-- 회원가입 -->
      <form id="signup-form" style="display:none">
        <h3>Sign Up</h3>
        <div class="id">
          <label for="userID">ID</label>
          <input id="userID" maxlength="32" type="text" placeholder="ID" value="" required />
        </div>
        <div class="pw">
          <label for="userPW">PW</label>
          <input id="userPW" maxlength="15" type="password" placeholder="PW" value="" required />
        </div>
        <button>Sign Up</button>
        <h6 id="message"></h6>
      </form>
      <!-- 로그인 -->
      <form id="login-form">
      <!-- <form id="login-form" style="display:none"> -->
        <h3>Log In</h3>
        <div class="id">
          <label for="login-id">ID</label>
          <input id="login-id" maxlength="32" type="text" placeholder="ID" />
        </div>
        <div class="pw">
          <label for="login-pw">PW</label>
          <input id="login-pw" maxlength="15" type="password" placeholder="PW" />
        </div>
        <div class="buttons">
          <button id="login">Log In</button>
          <button id="signup">Sign Up</button>
        </div>
      </form>

    </section>
    <!-- 시계 & Todo List -->
    <section id="clock-todolist" style="display:none">
    <!-- <section id="clock-todolist" style="display:flex"> -->
      <!-- 시계 -->
      <h2 id="clock"></h2>
      <div>
        <form id="todo-input-form">
          <input id="todo-input" class="todo-list" type="text" maxlength="50" placeholder="할 일을 입력하세요" /><button>+</button>
        </form>
        <ul id="todo-list" class="todo-list">
          <!-- <li><input type="checkbox" /><span>test</span><button>❌</button></li> -->
        </ul>
      </div>
    </section>
  </div>
  <!-- 스크립트 -->
  <script type="module" src="JavaScript/signup.js?ver=1"></script>
  <script type="module" src="JavaScript/login.js?ver=1.2"></script>
  <script src="JavaScript/clock.js?ver=1.1"></script>
</body>

</html>
