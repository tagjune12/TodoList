<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 구글 로그인 인증 -->
  <!-- <meta name="google-signin-client_id" content="829367681458-1kp13v94beem9jsegrk56jc7ppl4qis6.apps.googleusercontent.com"> -->
  <link rel="stylesheet" href="./CSS/index.css">
  <title>TodoList</title>
</head>

<body>
  <header id="main-header">
    <h1 id="title">Title</h1>
    <a id="signup">SIGN UP</a>
  </header>
  <div class="content">
    <section id="main-section">
      <!-- 회원가입 -->
      <form id="signup-form" class="hidden">
        <h3>Sign Up</h3>
        <div>
          <label for="userID">ID</label>
          <input id="userID" maxlength="32" type="text" placeholder="ID" value="" required />
        </div>
        <div>
          <label for="userPW">PW</label>
          <input id="userPW" maxlength="15" type="password" placeholder="PW" value="" required />
        </div>
        <button>Sign Up</button>
        <h6 id="message"></h6>
      </form>
      <!-- 로그인 -->
      <form id="login-form">
        <h3>Log In</h3>
        <div>
          <label for="login-id">ID</label>
          <input id="login-id" maxlength="32" type="text" placeholder="ID" required />
        </div>
        <div>
          <label for="login-pw">PW</label>
          <input id="login-pw" maxlength="15" type="password" placeholder="PW" required />
        </div>
        <button>Log In</button>
      </form>

    </section>
    <!-- 시계 & Todo List -->
    <section id="clock-todolist" class="hidden">
      <!-- 시계 -->
      <h3 id="clock"></h3>
      <div>
        <form id="todo-input-form">
          <input id="todo-input" class="todo-list" type="text" placeholder="할 일을 입력하세요" /><button>+</button>
        </form>
        <ul id="todo-list" class="todo-list">
          <li><input type="checkbox" /><span>test</span><button>❌</button></li>
        </ul>
      </div>
    </section>
  </div>
  <!-- 스크립트 -->
  <script type="module" src="JavaScript/signup.js?ver=1"></script>
  <script type="module" src="JavaScript/login.js?ver=1"></script>
  <script src="JavaScript/clock.js?ver=1.1"></script>
  <script src="JavaScript/todolist.js?ver=1.1"></script>
</body>

</html>
